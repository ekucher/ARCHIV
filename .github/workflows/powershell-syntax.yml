name: PowerShell syntax and build check

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  root-monolith-syntax:
    name: Validate root PowerShell monolith syntax
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository diagnostics
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "Current location:"
          Get-Location

          Write-Host "Git HEAD:"
          git rev-parse HEAD

          Write-Host "Repository root files:"
          Get-ChildItem -LiteralPath "." -Force | Sort-Object Name | Select-Object Mode,Length,Name

          if (-not (Test-Path -LiteralPath ".\.git")) {
              throw ".git directory not found after checkout."
          }

          if (-not (Test-Path -LiteralPath ".\Build-BRAVO-Monolith.ps1")) {
              throw "Build-BRAVO-Monolith.ps1 not found in repository root: $(Get-Location)"
          }

          if (-not (Test-Path -LiteralPath ".\src\BRAVO.build.json")) {
              throw "src\BRAVO.build.json not found in repository root: $(Get-Location)"
          }
      - name: Check root monolith syntax
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          if (Test-Path -LiteralPath ".\BRAVO_MAINTENANCE.ps1") {
              $tokens = $null
              $errors = $null

              [System.Management.Automation.Language.Parser]::ParseFile(
                  ".\BRAVO_MAINTENANCE.ps1",
                  [ref]$tokens,
                  [ref]$errors
              ) | Out-Null

              if ($errors -and $errors.Count -gt 0) {
                  foreach ($err in $errors) {
                      Write-Error ("Line {0}, Column {1}: {2}" -f `
                          $err.Extent.StartLineNumber, `
                          $err.Extent.StartColumnNumber, `
                          $err.Message)
                  }

                  throw "BRAVO_MAINTENANCE.ps1 syntax check failed."
              }

              Write-Host "BRAVO_MAINTENANCE.ps1 syntax OK"
          }
          else {
              Write-Host "BRAVO_MAINTENANCE.ps1 not found, skipping root monolith syntax check."
          }


