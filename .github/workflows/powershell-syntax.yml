name: PowerShell syntax and build check

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  syntax-and-build:
    name: Validate PowerShell syntax and build monolith
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check root monolith syntax
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          if (Test-Path -LiteralPath ".\BRAVO_MAINTENANCE.ps1") {
              $tokens = $null
              $errors = $null

              [System.Management.Automation.Language.Parser]::ParseFile(
                  ".\BRAVO_MAINTENANCE.ps1",
                  [ref]$tokens,
                  [ref]$errors
              ) | Out-Null

              if ($errors -and $errors.Count -gt 0) {
                  foreach ($err in $errors) {
                      Write-Error ("Line {0}, Column {1}: {2}" -f `
                          $err.Extent.StartLineNumber, `
                          $err.Extent.StartColumnNumber, `
                          $err.Message)
                  }

                  throw "BRAVO_MAINTENANCE.ps1 syntax check failed."
              }

              Write-Host "BRAVO_MAINTENANCE.ps1 syntax OK"
          }
          else {
              Write-Host "BRAVO_MAINTENANCE.ps1 not found, skipping root monolith syntax check."
          }

      - name: Build generated monolith
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          if (-not (Test-Path -LiteralPath ".\Build-BRAVO-Monolith.ps1")) {
              throw "Build-BRAVO-Monolith.ps1 not found."
          }

          .\Build-BRAVO-Monolith.ps1 -Clean -CreateSha512

      - name: Check generated monolith syntax
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $builtScript = ".\dist\BRAVO_MAINTENANCE.ps1"

          if (-not (Test-Path -LiteralPath $builtScript)) {
              throw "Built monolith not found: $builtScript"
          }

          $tokens = $null
          $errors = $null

          [System.Management.Automation.Language.Parser]::ParseFile(
              $builtScript,
              [ref]$tokens,
              [ref]$errors
          ) | Out-Null

          if ($errors -and $errors.Count -gt 0) {
              foreach ($err in $errors) {
                  Write-Error ("Line {0}, Column {1}: {2}" -f `
                      $err.Extent.StartLineNumber, `
                      $err.Extent.StartColumnNumber, `
                      $err.Message)
              }

              throw "Generated monolith syntax check failed."
          }

          Write-Host "Generated monolith syntax OK"

      - name: Verify generated files
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Get-Item .\dist\BRAVO_MAINTENANCE.ps1
          Get-Item .\dist\BRAVO_MAINTENANCE.ps1.sha512